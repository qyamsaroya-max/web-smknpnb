<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal | SMK Negeri Penerbangan Aceh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .bg-primary { background-color: #003366; }
        .text-primary { color: #003366; }
        .bg-accent { background-color: #FFC300; }
        
        /* Animasi background halus */
        .glass-bg {
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
        }
    </style>
</head>
<body class="glass-bg min-h-screen flex items-center justify-center p-6">

    <a href="index.html" class="absolute top-8 left-8 text-white flex items-center space-x-2 hover:text-accent transition">
        <span>←</span>
        <span class="text-sm font-semibold tracking-wide uppercase">Kembali ke Beranda</span>
    </a>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 md:p-12">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-primary rounded-2xl flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4 shadow-lg rotate-3">
                    ✈️
                </div>
                <h2 class="text-2xl font-bold text-primary">Portal Akademik</h2>
                <p class="text-gray-400 text-sm mt-1">Silakan masuk untuk mengakses data Anda</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Username / NISN</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 text-sm">👤</span>
                        <input type="text" required placeholder="Masukkan NISN Anda" 
                               class="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 text-sm">🔒</span>
                        <input type="password" id="passwordInput" required placeholder="••••••••" 
                               class="w-full pl-11 pr-12 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary transition">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-xs">
                    <label class="flex items-center text-gray-500 cursor-pointer">
                        <input type="checkbox" class="mr-2 rounded border-gray-300 text-primary focus:ring-primary">
                        Ingat Saya
                    </label>
                    <a href="#" class="font-bold text-primary hover:underline">Lupa Password?</a>
                </div>

                <button type="submit" class="w-full bg-primary text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-blue-900 hover:-translate-y-1 transition-all duration-300">
                    Masuk Sekarang
                </button>
            </form>

            <div class="mt-10 pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-400 text-xs">
                    Butuh bantuan akses? <br>
                    Hubungi <a href="kontak.html" class="text-primary font-bold hover:underline">Admin IT Sekolah</a>
                </p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 right-0 p-10 opacity-5 pointer-events-none hidden lg:block">
        <h1 class="text-9xl font-bold text-white">AVIATION</h1>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Sistem sedang dalam pengembangan. Silakan hubungi admin sekolah untuk akses akun.');
        });
    </script>

</body>
</html>
